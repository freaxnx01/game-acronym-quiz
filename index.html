<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>ACRONYM.QUIZ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08090b;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'JetBrains Mono','Fira Code','Cascadia Code','SF Mono',Consolas,monospace;color:#c9d1c9;overflow-x:hidden}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.scanlines{position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.18) 0px,rgba(0,0,0,.18) 1px,transparent 1px,transparent 3px);z-index:100}
#app{width:100%;max-width:760px;padding:24px;animation:flexIn .3s ease}
.term{background:#0c0f0d;border:1px solid #1f2a22;border-radius:10px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.term-bar{display:flex;align-items:center;gap:8px;padding:12px 16px;background:#10140f;border-bottom:1px solid #1f2a22}
.term-dot{width:12px;height:12px;border-radius:50%;background:#2b352c}
.term-prompt{margin-left:12px;font-size:13px;color:#5c675c}
.term-body{padding:48px 56px;display:flex;flex-direction:column;gap:28px;position:relative}
.green{color:#4ade80}.red{color:#f87171}.yellow{color:#facc15}.dim{color:#5c675c}.green-dim{color:#7d8a7d}
.title{font-size:48px;font-weight:800;letter-spacing:2px;color:#e8f5e8;line-height:1.05}
.cursor{display:inline-block;width:14px;height:38px;background:#4ade80;margin-left:6px;vertical-align:-5px;animation:blink 1.1s step-end infinite}
.btn{background:#4ade80;color:#08090b;font-weight:700;font-size:16px;padding:14px 36px;border-radius:6px;letter-spacing:1px;border:none;cursor:pointer;transition:.15s;font-family:inherit}
.btn:hover{background:#86efac}
.btn-outline{background:transparent;border:1px solid #2b352c;color:#7d8a7d;padding:12px 28px;border-radius:6px;font-size:15px;cursor:pointer;transition:.15s;font-family:inherit}
.btn-outline:hover{border-color:#4ade80;color:#4ade80}
.tag{border:1px solid #2b352c;color:#7d8a7d;font-size:14px;padding:8px 16px;border-radius:6px;cursor:pointer;transition:.15s;font-family:inherit;background:transparent}
.tag.on{border-color:#4ade80;color:#4ade80;background:rgba(74,222,128,.08)}
.tag.yel{border-color:#facc15;color:#facc15;background:rgba(250,204,21,.08)}
.lang-btn{border:1px solid #2b352c;color:#7d8a7d;font-size:14px;padding:6px 16px;border-radius:6px;cursor:pointer;background:transparent;font-family:inherit;transition:.15s}
.lang-btn.on{border-color:#4ade80;color:#4ade80;background:rgba(74,222,128,.08)}
.option{display:flex;align-items:center;gap:16px;border:1px solid #2b352c;border-radius:8px;padding:16px 20px;font-size:16px;color:#c9d1c9;cursor:pointer;transition:.15s}
.option:hover{border-color:#4ade80}
.option.sel{border-color:#4ade80;background:rgba(74,222,128,.1);color:#e8f5e8}
.option-key{color:#5c675c;font-weight:700;width:24px}
.opt-correct{border-color:#4ade80!important;background:rgba(74,222,128,.1)!important}
.opt-wrong{border-color:#f87171!important;background:rgba(248,113,113,.1)!important}
.letter-btn{width:38px;height:38px;border:1px solid #2b352c;border-radius:5px;background:transparent;color:#7d8a7d;font-size:15px;font-weight:700;cursor:pointer;transition:.12s;font-family:inherit;display:flex;align-items:center;justify-content:center}
.letter-btn:hover:not(:disabled){border-color:#4ade80;color:#4ade80}
.letter-btn:disabled{opacity:.25;cursor:default}
.letter-btn.hit{border-color:#4ade80;color:#4ade80;background:rgba(74,222,128,.1)}
.letter-btn.miss{border-color:#f87171;color:#f87171;background:rgba(248,113,113,.08)}
.puzzle-char{display:inline-block;min-width:22px;text-align:center;font-size:28px;font-weight:800;padding:4px 2px;border-bottom:2px solid #2b352c;margin:0 2px;color:transparent}
.puzzle-char.revealed{color:#4ade80;border-bottom-color:#4ade80}
input.solve-input{background:#0c0f0d;border:1px solid #2b352c;border-radius:6px;padding:12px 16px;font-size:16px;color:#e8f5e8;font-family:inherit;flex:1;outline:none}
input.solve-input:focus{border-color:#4ade80}
.db-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid #161e18;font-size:14px;transition:.1s}
.db-row:hover{background:#10140f}
.db-search{background:#0c0f0d;border:1px solid #2b352c;border-radius:6px;padding:10px 14px;font-size:14px;color:#e8f5e8;font-family:inherit;outline:none;width:100%}
.db-search:focus{border-color:#4ade80}
.score-bar{height:6px;background:#1a211b;overflow:hidden}
.score-bar-fill{height:6px;background:linear-gradient(90deg,#4ade80,#facc15);transition:width .3s}
.scroll{max-height:320px;overflow-y:auto;border:1px solid #161e18;border-radius:8px}
.scroll::-webkit-scrollbar{width:8px}.scroll::-webkit-scrollbar-track{background:#0c0f0d}.scroll::-webkit-scrollbar-thumb{background:#2b352c;border-radius:4px}
.hidden{display:none!important}
.fade{animation:flexIn .3s ease}
</style>

// Filter acronyms by selected topics + difficulty

    if(state.topics.size>0){let key=a.cat+'/'  +a.subcat;if(!state.topics.has(key))return false}
    return true;
  });
}

function getFiltered(){
  let pool=getTopicFiltered();
  let diff=DIFFICULTY[state.difficulty];
  if(diff && state.difficulty!=='greybeard'){
    pool=pool.filter(a=>diff.includes(a.acronym));

  if(state.difficulty==='greybeard'){
    // greybeard = all acronyms, not just the easy ones
    let allDiff=[...new Set([...DIFFICULTY.junior,...DIFFICULTY.senior,...DIFFICULTY.greybeard])];
    pool=pool.filter(a=>allDiff.includes(a.acronym));
  }
  return pool;
}

// Categories whose "full" text is German — decoys for these must only swap in
// other German words, never English tech vocabulary, regardless of UI language.
const GERMAN_CATS=new Set(["German","Swiss Military","Swiss Law","DDR"]);
function acronymLang(a){return GERMAN_CATS.has(a.cat)?'de':'en'}

// Clean vocabulary harvested from every expansion, split on whitespace AND
// hyphens (so "Short-Term" yields both "Short" and "Term"), stripped to letters
// and bucketed by first letter + language. Used to build decoys that share the
// acronym's exact initialism — real MC decoys must spell the same acronym,
// otherwise the answer is just initials-matching against unrelated expansions.
// Kept per-language so a German entry's decoys never pull in an English word.
const VOCAB=(()=>{
  const m={};
  ACRONYMS.forEach(a=>{
    const lang=acronymLang(a);
    a.full.split(/[\s-]+/).forEach(raw=>{
      const w=raw.replace(/[^\p{L}']/gu,'');
      if(!w)return;
      const k=w[0].toUpperCase();
      m[k]=m[k]||{en:new Set(),de:new Set()};
      m[k][lang].add(w);
    });
  });
  const out={};for(const k in m)out[k]={en:[...m[k].en],de:[...m[k].de]};
  return out;
})();

// Short function words carry acronym letters (Wine Is Not an Emulator) but read
// badly when swapped — keep them verbatim so decoys stay plausible. Covers both
// English and German fillers since the DB's "full" text is whatever language the
// entry itself is written in, independent of the UI language toggle.
const STOPWORDS=/^(a|an|as|of|the|is|to|not|and|for|from|in|on|der|die|das|den|dem|des|ein|eine|einer|eines|einem|einen|und|für|von|zu|zur|zum|mit|auf|bei|nach|vor|über|unter|durch|ohne|um|im|am|ins|aus|als|oder|wie)$/i;

// Replace one hyphen-part's leading letters with a different same-initial word
// from the SAME language, preserving trailing punctuation (commas, colons, 's)
// and non-letter tokens. Uses \p{L} (not A-Za-z) so umlauts/ß in German words
// (für, Öffentlicher) are captured as part of the head instead of being split
// off and mangled.
function subPart(part,lang){
  const mm=part.match(/^([\p{L}]+)(.*)$/u);
  if(!mm)return part;                       // punctuation / numbers → keep
  const head=mm[1],tail=mm[2];
  if(STOPWORDS.test(head))return part;
  const bucket=VOCAB[head[0].toUpperCase()];
  const alts=(bucket?bucket[lang]:[]).filter(x=>x.toUpperCase()!==head.toUpperCase());
  return (alts.length?alts[Math.floor(Math.random()*alts.length)]:head)+tail;
}

// Build a plausible fake expansion with the SAME whitespace/hyphen/initial
// skeleton as the real one → the same acronym derivation yields the same
// acronym (e.g. "Long Short-Term Memory" → another L-S-T-M expansion).
function makeFakeExpansion(real,lang){
  return real.split(/\s+/).map(tok=>tok.split('-').map(p=>subPart(p,lang)).join('-')).join(' ');
}

function makeDistractors(real,count,lang){
  const out=new Set();
  for(let g=0;out.size<count&&g<count*20;g++){
    const fake=makeFakeExpansion(real,lang);
    if(fake!==real)out.add(fake);
  }
  return [...out];
}

function buildMCQuestions(pool,n){
  let picked=pickN(pool,n);
  return picked.map(a=>{
    const lang=acronymLang(a);
    let wrong=makeDistractors(a.full,3,lang);
    // Fallback for short expansions with too little same-initial vocabulary:
    // top up with other acronyms' real expansions (rare). Prefer same-language
    // entries first so the fallback decoys don't mix languages either.
    if(wrong.length<3){
      const candidates=pool.filter(x=>x.acronym!==a.acronym&&x.full!==a.full&&!wrong.includes(x.full));
      const sameLang=candidates.filter(x=>acronymLang(x)===lang);
      const extraPool=sameLang.length>=3-wrong.length?sameLang:candidates;
      const extra=pickN(extraPool,3-wrong.length).map(x=>x.full);
      wrong=wrong.concat(extra);
    }
    let opts=shuffle([a.full,...wrong]);
    return{acronym:a.acronym,full:a.full,cat:a.cat,subcat:a.subcat,link:a.link,options:opts,correctIdx:opts.indexOf(a.full)};
  });
}

function mcAnswer(idx){
  const q=state.quizData;
  const cur=q.questions[q.idx];
  if(q.answers[q.idx])return; // already answered
  const correct=idx===cur.correctIdx;
  const pts=correct?100+q.streak*20:0;
  q.streak=correct?q.streak+1:0;
  q.bestStreak=Math.max(q.bestStreak,q.streak);
  q.score+=pts;
  q.answers.push({acronym:cur.acronym,full:cur.full,correct,pts,picked:cur.options[idx]});
  // Highlight
  const optEl=document.getElementById('opt'+idx);
  const correctEl=document.getElementById('opt'+cur.correctIdx);
  if(optEl)optEl.className='option '+(correct?'opt-correct':'opt-wrong');
  if(correctEl&&idx!==cur.correctIdx)correctEl.className='option opt-correct';
  document.onkeydown=null;
  setTimeout(()=>{q.idx++;render()},1500);
}

function mcKeyHandler(e){
  const q=state.quizData;
  if(e.key==='Escape'){quitToStart();return}
  if(!q||q.idx>=q.questions.length)return;
  if(q.answers[q.idx])return;
  const k=e.key.toUpperCase();
  if(k>='A'&&k<='D'){mcAnswer(k.charCodeAt(0)-65)}
  if(e.key==='Enter'&&q.answers[q.idx]){q.idx++;render()}
}

// ─── GLÜCKSRAD (Wheel of Fortune) ───
function startGlueck(recursiveOnly){
  let pool=recursiveOnly?ACRONYMS.filter(a=>a.recursive):getFiltered();
  if(!recursiveOnly&&pool.length===0)pool=getTopicFiltered(); // relax difficulty first, keep topic choice
  if(pool.length===0)pool=recursiveOnly?ACRONYMS.filter(a=>a.recursive):ACRONYMS; // only give up on the topic choice if it truly matched nothing
  state.glueckData={
    item:pickN(pool,1)[0],
    revealed:new Set(),
    guessed:new Set(),
    lives:6,
    score:0,
    solved:false,
    showSolve:false,
    history:[],
    recursiveOnly:!!recursiveOnly
  };
  state.screen='glueck';
  render();
}

function renderGlueck(root){
  const g=state.glueckData;
  if(!g){startGlueck();return}
  if(g.lives<=0&&!g.solved){
    // Lost
    root.innerHTML=glueckResult(false,g);
    document.onkeydown=null;
    return;
  }
  if(g.solved){
    root.innerHTML=glueckResult(true,g);
    document.onkeydown=null;
    return;
  }
  const full=g.item.full.toUpperCase();
  const letters=full.split('');
  const alpha='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  root.innerHTML=`
    <div class="term">
      <div class="term-bar">
        <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
          <span class="term-prompt">${g.item.acronym}</span>
          <div style="display:flex;align-items:center;gap:18px">
            <span style="font-size:13px;color:#f87171">♥ ${t().lives}: ${g.lives}</span>
            <span style="font-size:13px;color:#4ade80">${t().score}: ${g.score}</span>
            <button class="btn-outline" style="padding:6px 14px;font-size:13px" onclick="quitToStart()">${t().cancel}</button>
          </div>
        </div>
      </div>
      <div class="term-body">
        <div>
          <div style="font-size:14px;color:#5c675c;margin-bottom:10px">&gt; ${t().expandAcronym} <span style="color:#7d8a7d">(${g.item.cat} · ${g.item.subcat})</span></div>
          <div style="font-size:48px;font-weight:800;letter-spacing:3px;color:#e8f5e8;margin-bottom:16px">${g.item.acronym}</div>
          <div style="display:flex;flex-wrap:wrap;gap:2px;line-height:1.4">
            ${letters.map(ch=>{
              if(!/[A-Z]/.test(ch))return `<span style="font-size:28px;font-weight:800;color:#7d8a7d;padding:4px 2px">${ch===' '?'&nbsp;':ch}</span>`;
              const rev=g.revealed.has(ch);
              return `<span class="puzzle-char ${rev?'revealed':''}">${rev?ch:'_'}</span>`;
            }).join('')}
          </div>
        </div>
        ${g.showSolve?`
          <div style="display:flex;gap:12px;align-items:center">
            <input class="solve-input" id="solveInput" placeholder="${t().solvePlaceholder}" autocomplete="off" />
            <button class="btn" onclick="glueckSolve()">${t().solveBtnConfirm}</button>
            <button class="btn-outline" onclick="state.glueckData.showSolve=false;render()">${t().back}</button>
          </div>
        `:`
          <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
            <button class="btn-outline" onclick="state.glueckData.showSolve=true;render()">📝 ${t().solveBtn}</button>
            <span style="font-size:13px;color:#5c675c">${t().pickLetter} · ${t().cancelKey}</span>
          </div>
        `}
        <div style="display:grid;grid-template-columns:repeat(13,1fr);gap:4px;max-width:560px">
          ${alpha.map(l=>`
            <button class="letter-btn ${g.guessed.has(l)?(g.revealed.has(l)?'hit':'miss'):''}"
              ${g.guessed.has(l)?'disabled':''}
              onclick="glueckGuess('${l}')">${l}</button>
          `).join('')}
        </div>
      </div>
    </div>`;
  if(g.showSolve){
    const inp=document.getElementById('solveInput');
    if(inp){inp.focus();inp.onkeydown=e=>{if(e.key==='Enter')glueckSolve()}}
  }
  document.onkeydown=glueckKeyHandler;
}

function glueckGuess(letter){
  const g=state.glueckData;
  if(g.guessed.has(letter)||g.solved||g.lives<=0)return;
  g.guessed.add(letter);
  const full=g.item.full.toUpperCase();
  if(full.includes(letter)){
    g.revealed.add(letter);
    const count=full.split('').filter(c=>c===letter).length;
    g.score+=count*20;
    // Check if fully revealed
    const allRevealed=full.split('').every(c=>!/[A-Z]/.test(c)||g.revealed.has(c));
    if(allRevealed){g.solved=true;g.score+=100}
  }else{
    g.lives--;
  }
  render();
}

function glueckSolve(){
  const g=state.glueckData;
  const inp=document.getElementById('solveInput');
  if(!inp)return;
  const val=inp.value.trim().toUpperCase();
  const correct=g.item.full.toUpperCase();
  if(val===correct){
    g.solved=true;
    // Bonus for remaining lives + unrevealed letters
    const unrevealed=correct.split('').filter(c=>/[A-Z]/.test(c)&&!g.revealed.has(c)).length;
    g.score+=100+unrevealed*10+g.lives*20;
  }else{
    g.lives--;
    g.showSolve=false;
  }
  render();
}

function glueckKeyHandler(e){
  if(e.key==='Escape'){quitToStart();return}
  const g=state.glueckData;
  if(!g||g.solved||g.lives<=0)return;
  if(g.showSolve)return; // typing in input
  const k=e.key.toUpperCase();
  if(k>='A'&&k<='Z')glueckGuess(k);
}

function glueckResult(won,g){
  const full=g.item.full;
  const ac=g.item.acronym;
  return `
    <div class="term">
      <div class="term-bar"><span class="term-prompt">${t().processExited}</span></div>
      <div class="term-body">
        <div style="display:flex;align-items:baseline;gap:24px;flex-wrap:wrap">
          <div style="font-size:48px;font-weight:800;color:${won?'#4ade80':'#f87171'}">${won?'SOLVED':'GAME OVER'}</div>
        </div>
        <div>
          <div style="font-size:14px;color:#5c675c;margin-bottom:6px">${ac}</div>
          <div style="font-size:24px;font-weight:700;color:#e8f5e8">${full}</div>
          ${g.item.link?`<a href="${g.item.link}" target="_blank" rel="noopener" style="font-size:13px;color:#4ade80;margin-top:8px;display:inline-block">↗ Wikipedia</a>`:''}
        </div>
        <div style="font-size:14px;color:#7d8a7d">${t().score}: <span style="color:#4ade80">${g.score}</span> · ${t().lives}: ${g.lives}</div>
        <div style="display:flex;gap:14px;flex-wrap:wrap">
          <button class="btn" onclick="startGlueck(${g.recursiveOnly})">↻ ${t().runAgain}</button>
          <button class="btn-outline" onclick="state.screen='${g.recursiveOnly?'recursive':'start'}';state.glueckData=null;render()">← ${t().back}</button>
        </div>
      </div>
    </div>`;
}

// ─── RECURSIVE ACRONYMS (info · list · Fill in the Blanks quiz) ───
function renderRecursive(root){
  const recs=ACRONYMS.filter(a=>a.recursive);
  const ex=recs.find(a=>a.acronym==='GNU')||recs[0];
  root.innerHTML=`
    <div class="term">
      <div class="term-bar">
        <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
          <span class="term-prompt">user@quizbox:~$ man recursive-acronyms</span>
          <span style="font-size:13px;color:#5c675c">${recs.length} entries</span>
        </div>
      </div>
      <div class="term-body">
        <div>
          <div style="font-size:14px;color:#4ade80;margin-bottom:10px">&gt; ${t().recursive}</div>
          <div style="font-size:15px;color:#c9d1c9;line-height:1.6">${t().recursiveInfo}</div>
          <div style="margin-top:14px;padding:14px 18px;border:1px solid #2b352c;border-radius:8px;background:#10140f">
            <span style="color:#5c675c;font-size:13px">${t().example}: </span>
            <span style="color:#e8f5e8;font-weight:700">${ex.acronym}</span>
            <span style="color:#7d8a7d"> = ${ex.full}</span>
          </div>
        </div>
        <div>
          <div style="font-size:13px;color:#5c675c;margin-bottom:10px">--${t().allRecursive}</div>
          <div class="scroll">
            ${recs.map(a=>`
              <div class="db-row">
                <span style="color:#facc15;font-weight:700;width:72px;flex-shrink:0">${a.acronym}</span>
                <span style="color:#c9d1c9;flex:1">${a.full}</span>
                ${a.link?`<a href="${a.link}" target="_blank" rel="noopener" style="color:#4ade80;text-decoration:none;font-size:13px">↗</a>`:''}
              </div>
            `).join('')}
          </div>
        </div>
        <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center">
          <button class="btn" onclick="startGlueck(true)">▶ ${t().gluecksrad}</button>
          <button class="btn-outline" onclick="state.screen='start';render()">${t().back}</button>
        </div>
      </div>
    </div>`;
  document.onkeydown=null;
}

// ─── DB BROWSER (search · filter · browse) ───
function setDbSearch(v){state.dbSearch=v;render()}
function setDbCat(c){state.dbCat=c;render()}

function renderDB(root){
  const cats=getCategories();
  const catNames=Object.keys(cats);
  const q=(state.dbSearch||'').toLowerCase();
  const rows=ACRONYMS.filter(a=>{
    if(state.dbCat&&a.cat!==state.dbCat)return false;
    if(q)return a.acronym.toLowerCase().includes(q)||a.full.toLowerCase().includes(q);
    return true;
  });
  // group cat → subcat, preserving DB order
  const grouped={};
  rows.forEach(a=>{if(!grouped[a.cat])grouped[a.cat]={};if(!grouped[a.cat][a.subcat])grouped[a.cat][a.subcat]=[];grouped[a.cat][a.subcat].push(a)});
  root.innerHTML=`
    <div class="term">
      <div class="term-bar">
        <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
          <span class="term-prompt">user@quizbox:~$ grep -ri . acronyms.db</span>
          <span style="font-size:13px;color:#5c675c">${rows.length} / ${ACRONYMS.length}</span>
        </div>
      </div>
      <div class="term-body">
        <div>
          <div style="font-size:14px;color:#4ade80;margin-bottom:12px">&gt; ${t().browse}</div>
          <input class="db-search" id="dbSearch" placeholder="${t().search}" value="${(state.dbSearch||'').replace(/"/g,'&quot;')}" oninput="setDbSearch(this.value)" autocomplete="off" />
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          <button class="tag ${state.dbCat?'':'on'}" onclick="setDbCat('')">${t().allCats}</button>
          ${catNames.map(c=>`<button class="tag ${state.dbCat===c?'on':''}" onclick="setDbCat('${c}')">${c}</button>`).join('')}
        </div>
        <div class="scroll">
          ${rows.length===0?`<div style="padding:28px;text-align:center;color:#5c675c">${t().noResults}</div>`:
            Object.entries(grouped).map(([c,subs])=>
              Object.entries(subs).map(([s,items])=>`
                <div style="padding:8px 14px;background:#10140f;font-size:12px;color:#5c675c;border-bottom:1px solid #161e18">${c} · ${s}</div>
                ${items.map(a=>`
                  <div class="db-row">
                    <span style="color:#e8f5e8;font-weight:700;width:88px;flex-shrink:0">${a.acronym}</span>
                    <span style="color:#7d8a7d;flex:1">${a.full}</span>
                    ${a.recursive?`<span style="color:#facc15;font-size:11px">↺ rec</span>`:''}
                    ${a.link?`<a href="${a.link}" target="_blank" rel="noopener" style="color:#4ade80;text-decoration:none;font-size:13px">↗</a>`:''}
                  </div>
                `).join('')}
              `).join('')
            ).join('')
          }
        </div>
        <div style="display:flex;gap:14px">
          <button class="btn-outline" onclick="state.screen='start';render()">${t().back}</button>
        </div>
      </div>
    </div>`;
  // keep focus + caret at end while typing (full re-render on each keystroke)
  const inp=document.getElementById('dbSearch');
  if(inp&&state.dbSearch){inp.focus();const v=inp.value;inp.value='';inp.value=v}
  document.onkeydown=null;
}

render();
</script>
</body>
